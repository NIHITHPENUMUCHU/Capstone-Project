<header class="global-header">
  
  <div class="brand-logo" [routerLink]="IsLoggin ? '/dashboard' : '/login'">
    <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="var(--c-teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 2 22 12 17 22 22 12 2"></polygon>
    </svg>
    <span class="brand-text">EventMaster</span><span class="brand-dot">.</span>
  </div>
  
  <ng-container *ngIf="IsLoggin">
    <nav class="main-nav">
      <ng-container *ngIf="roleName === 'PLANNER'">
        <a routerLink="/create-event" routerLinkActive="active-link">Events</a>
        <a routerLink="/add-resource" routerLinkActive="active-link">Inventory</a>
        <a routerLink="/resource-allocate" routerLinkActive="active-link">Allocation</a>
      </ng-container>

      <ng-container *ngIf="roleName === 'STAFF'">
        <a routerLink="/view-events" routerLinkActive="active-link">Operations</a>
      </ng-container>

      <ng-container *ngIf="roleName === 'CLIENT'">
        <a routerLink="/booking-details" routerLinkActive="active-link">My Tickets</a>
      </ng-container>
    </nav>

    <div class="user-actions">
      <div class="role-badge">{{ roleName }}</div>
      <button class="logout-btn" (click)="triggerLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Log Out
      </button>
    </div>
  </ng-container>

</header>

<div class="modal-overlay" *ngIf="showLogoutModal" (click)="cancelLogout()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-icon warning">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </div>
    <!-- <h3>Confirm Disconnect</h3> -->
    <h5>Are you sure you want to log out of your active session?</h5>
    <br>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="cancelLogout()">Cancel</button>
      <button class="btn-confirm" (click)="confirmLogout()">Yes, Log Out</button>
    </div>
  </div>
</div>

<main class="app-content">
  <router-outlet></router-outlet>
</main>
