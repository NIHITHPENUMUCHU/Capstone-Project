<div class="container">
    <h2>View Booking Details</h2>

    <div class="form-group" style="display: flex; gap: 10px; flex-direction: row;">
        <input type="number" (input)="formModel.eventID = $any($event.target).value" placeholder="Enter Event ID"
            style="flex: 1;">
        <button class="btn" style="margin-top: 0;" (click)="searchEvent()">Search</button>
    </div>

    <div *ngIf="showError" class="alert alert-danger">{{ errorMessage }}</div>

    <div *ngFor="let item of scores$" class="booking-card">
        <h3>{{ item.title }}</h3>
        <p><strong>Description:</strong> {{ item.description }}</p>
        <p><strong>Location:</strong> {{ item.location }}</p>
        <p><strong>Date & Time:</strong> {{ item.dateTime | date:'medium' }}</p>
        <p>
            <strong>Status:</strong>
            <span class="badge" [ngClass]="{'ongoing': item.status === 'ONGOING'}">
                <span *ngIf="item.status === 'ONGOING'" class="live-pulse"></span>
                {{ item.status }}
            </span>
        </p>
    </div>
</div>
